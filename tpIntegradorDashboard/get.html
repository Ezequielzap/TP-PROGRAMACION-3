<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>

    <link rel="shortcut icon" href="assets/img/favicon.ico" type="image/x-icon">

    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <header>
        <div class="logo">
            <a href="index.html" class="logo-container">
                <img src="assets/img/neymar-logo-blanco.png" alt="logo pumpernic">
            </a>
        </div>

        <ul class="enlaces">
            <li class="enlace">
                <a href="index.html">
                    <span>VER</span>
                </a>
            </li>

            <li class="enlace">
                <a href="get.html">
                    <span>CONSULTAR</span>
                </a>
            </li>

            <li class="enlace">
                <a href="post.html">
                    <span>CREAR</span>
                </a>
            </li>

            <li class="enlace">
                <a href="put.html">
                    <span>MODIFICAR</span>
                </a>
            </li>

            <li class="enlace">
                <a href="delete.html">
                    <span>ELIMINAR</span>
                </a>
            </li>
        </ul>
    </header>

    <main>

        <section class="form-productos">
            <h2>Consultar producto por ID</h2>

            <form id="getProduct-form" class="form-alta">

                <label for="idProd">ID del producto</label>

                <input
                    type="number"
                    name="id"
                    id="idProd"
                    required
                >

                <div>
                    <input
                        type="submit"
                        value="Consultar producto"
                    >
                </div>

            </form>

        </section>

        <section class="secccion-productos">

            <div id="contenedor-productos">

            </div>

        </section>

    </main>

    <script>

        const contenedorProductos = document.getElementById("contenedor-productos");
        const getProductForm = document.getElementById("getProduct-form");
        const urlBase = "http://localhost:3000/api/products";

        //mostramos los mensajes de error Visualmente
        function mostrarError(message){
            contenedorProductos.innerHTML =`
                <p class ="mensaje mensaje-error">${message}</p>
            `;
        }
        getProductForm.addEventListener("submit", async event => {
            event.preventDefault();

            console.log(event.target);
            /*
            const formData = new FormData(event.target);
            console.log(formData);

            const data = Object.fromEntries(formData.entries());
            console.log(data);

            const idProd = data.id;
            console.log(idProd);
            */

            //optimizacion1 : podemos saltarnos el formData
            const idProd = event.target.idProd.value.trim();

            //optimizacion 2: tambien filtramos en el cliente en caso de que no hay aun id valido
            if(!idProd){
                mostrarError("ingresa un ID valido");
                return;
            }

            try {
                //optimizacion 3 : evitamos hardcodear la URL guardandola en una variable
                //gracias a la API fetch , realizo una peticion HTTP GET a mi propia api rest al endpint GET/api/products
                const response = await fetch(`${urlBase}/${idProd}`);

                //transformamos la informacion en JSON del producto en un objeto JS
                const data = await response.json();

                //Optimizacion 4: evaluamos si el servidor respondio un OK
                if(!response.ok){
                    mostrarError(data.message)
                    return;
                }

                console.log(data.payload[0]);

                const producto = data.payload[0];

                console.log(producto);

                mostrarProducto(producto);

            } catch (error) {
                console.error("Error al obtener el producto:", error);
                mostrarError("error","Error de conexion con el servidor")

            }
        });

        function mostrarProducto(producto) {

            let htmlProducto = `
                <ul>
                    <li class="lista-producto">
                        <img src="${producto.img}" alt="${producto.nombre}">
                        <p>
                            Id: ${producto.id}
                            / Nombre: ${producto.nombre}
                            / <strong>Precio: $${producto.precio}</strong>
                        </p>
                    </li>
                </ul>
            `;

            contenedorProductos.innerHTML = htmlProducto;
        }

    </script>

</body>

</html>
