<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>

    <link rel="shortcut icon" href="assets/img/favicon.ico" type="image/x-icon">

    <!-- Preset CSS -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header>
        <div class="logo">
            <a href="index.html" class="logo-container">
                <img src="assets/img/neymar-logo-blanco.png" alt="logo pumpernic">
            </a>
        </div>

        <ul class="enlaces">
            <li class="enlace">
                <a href="index.html">
                    <span>VER</span>
                </a>
            </li>

            <li class="enlace">
                <a href="get.html">
                    <span>CONSULTAR</span>
                </a>
            </li>

            <li class="enlace">
                <a href="post.html">
                    <span>CREAR</span>
                </a>
            </li>

            <li class="enlace">
                <a href="put.html">
                    <span>MODIFICAR</span>
                </a>
            </li>

            <li class="enlace">
                <a href="delete.html">
                    <span>ELIMINAR</span>
                </a>
            </li>
        </ul>
    </header>

    <main>

        <section class="secccion-productos">
            <h2>Nuestros productos</h2>
            <div id="contenedor-productos">
                
                <div class="card-producto">
                    <img src="" alt="">
                    <h4>hamburguesa</h4>
                    <p>Id: 1</p>
                    <p>$3000</p>
                </div>
            
            </div>
        </section>
    </main>

    <script>
        const contenedorProductos = document.getElementById("contenedor-productos");

        const urlBase = "http://localhost:3000/api/products/";

        //mostramos los mensajes de error Visualmente
        function mostrarError(message){
            contenedorProductos.innerHTML =`
                <p class ="mensaje mensaje-error">${message}</p>
            `;
        }

        async function obtenerProductos() {
            try {

                //gracias a la API fecht , realizo una peticion HTTP Get a mi propia api rest al endpoint get/api/products
                const response = await fetch(urlBase);

                console.log(response);//Aca podemos chequear el booleano que vamos a usar en el if de abajo

                //una vez que recibo todo el JSON , lo parseo con resonde.json()
                const data = await response.json();
                
                //los codigos 2000 llevan un booleano ok: true 200
                if(!response.ok){
                    alert(data.message);
                    mostrarError(data.message);
                    return;
                }

                //extraigo los productos que vienen en la clave payload
                const productos = data.payload;
                console.log(productos);
                
                renderizarProductos(productos);

            } catch (error) {
                console.error(error);
                mostrarError("Error de conexion con el servidor")
            }

        }

        function renderizarProductos(array) {
            let htmlProductos = "";

            array.forEach(producto => {
                htmlProductos += `
                    <div class="card-producto">
                        <img src="${producto.img}" alt="${producto.nombre}">
                        <h4>${producto.nombre}</h4>
                        <p>Id: ${producto.id}</p>
                        <p>$${producto.precio}</p>
                    </div>
                `;
            });

            contenedorProductos.innerHTML = htmlProductos;
        }

        obtenerProductos();


    </script>
    
</body>
</html>
