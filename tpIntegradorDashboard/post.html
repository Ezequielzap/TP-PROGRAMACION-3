<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>

    <link rel="shortcut icon" href="assets/img/favicon.ico" type="image/x-icon">

    <!-- Preset CSS -->
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <header>
        <div class="logo">
            <a href="index.html" class="logo-container">
                <img src="assets/img/neymar-logo-blanco.png" alt="logo pumpernic">
            </a>
        </div>

        <ul class="enlaces">
            <li class="enlace">
                <a href="index.html">
                    <span>VER</span>
                </a>
            </li>

            <li class="enlace">
                <a href="get.html">
                    <span>CONSULTAR</span>
                </a>
            </li>

            <li class="enlace">
                <a href="post.html">
                    <span>CREAR</span>
                </a>
            </li>

            <li class="enlace">
                <a href="put.html">
                    <span>MODIFICAR</span>
                </a>
            </li>

            <li class="enlace">
                <a href="delete.html">
                    <span>ELIMINAR</span>
                </a>
            </li>
        </ul>
    </header>

    <main>

        <section class="form-productos">
            <h2>Crear producto</h2>

            <form id="postProduct-form" class="form-alta">
                <label for="nameProd">Nombre</label>
                <input type="text" name="name" id="nameProd" required>

                <label for="imageProd">Imagen</label>
                <input type="text" name="image" id="imageProd" required>

                <label for="categoryProd">Categoria</label>
                <select name="category" id="categoryProd" required>
                    <option value="Pelota">Pelota</option>
                    <option value="Botin">Botin</option>
                </select>

                <label for="priceProd">Precio</label>
                <input type="number" name="price" id="priceProd" required>

                <div>
                    <input type="submit" value="Crear producto">
                </div>
            </form>

        </section>

        <section class="secccion-productos">
            <div id="contenedor-productos">

            </div>
        </section>
    </main>

    <script>

        const contenedorProductos = document.getElementById("contenedor-productos");
        const postProductForm = document.getElementById("postProduct-form");
        const urlBase = "http://localhost:3000/api/products";

        //optimizacion 1 : validacion previa de los datos en el cliente
        function validarFormulario(data) {
            const errores = [];

            if (!data.name || data.name.trim().length < 2) {
                errores.push("El nombre debe tener al menos 2 caracteres");
            }

            if (!data.price || isNaN(data.price) || Number(data.price) < 0) {
                errores.push("El precio debe ser un numero mayor a 0")
            }

            if (!data.category) {
                errores.push("Categoria Invalida")
            }

            return errores;
        }


        //Optimizacion 2: mostramos los mensajes de exito o error Visualmente
        function mostrarMensaje(type, message) {
            contenedorProductos.innerHTML = `
                <p class ="mensaje mensaje-${type}">${message}</p>
            `;
        }

        function mostrarListaErrores(array) {
            let htmlErrores = "";
            array.forEach(error => {
                htmlErrores += `<p class="mensaje mensaje-error">${error}</p>`
            });
            contenedorProductos.innerHTML = htmlErrores;
        }

        //gestionamos el envio de datos del formulario        
        postProductForm.addEventListener("submit", async event => {
            event.preventDefault();

            const formData = new FormData(event.target);

            const data = Object.fromEntries(formData.entries());

            //optimizacion 3: parseamos price antes de enviarlo , por que el formData devuelve como string
            data.price = Number(data.price);

            console.log(data); // {name: 'Muzza', image: 'https://.jpg', category: 'food', price: '123'}

            //Optimizacion 4: llamamos a la funcion validar los datos del formulario 
            const errores = validarFormulario(data);

            //si hay errores mostramos mensaje de error y terminamos con el return
            if (errores.length > 0) {
                mostrarListaErrores(errores);
                return;
            }

            try {
                const response = await fetch(urlBase, {
                    method: "POST",
                    //que tipo de contenido va a resivir el endPoind
                    headers: {
                        "Content-Type": "application/json"
                    },

                    //en el cuerpo de la peticion le mando el objeto para trasformarlo a JSON
                    //data -> JSON para el server
                    body: JSON.stringify(data)
                });

                //response 200(ok)
                console.log(response); // Response {type: 'cors', url: 'http://localhost:3000/api/products', redirected: false, status: 200, ok: true, …}


                const result = await response.json(); // Aca obtenemos la respuesta parseada que me devuelve el servidor

                //Optimizacion 5: manejamos respuesta no ok del servidor
                if (!response.ok) {
                    let mensaje = "";
                    //En caso de recibir el 400 del middleware validateProduct (envia string = array errores)
                    if (result.errores) {
                        mensaje = result.message + result.errores.join("\n");
                    } else {
                        mensaje = result.mensaje;
                    }

                    mostrarMensaje("error", mensaje);
                    return;
                }

                mostrarMensaje("exito", result.message);
                console.log(result.message);

            } catch (error) {
                console.error("Error al enviar los datos ", error);
                mostrarMensaje("error", "Error al procesar la solicitud")
            }

        })

    </script>

</body>

</html>
